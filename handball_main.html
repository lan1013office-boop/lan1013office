<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><title>レトロハンドボール</title>
<style>
body{background:#000;color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;margin:0;font-family:'PixelMplus12',monospace;}
canvas{border:2px solid #fff;background:#d2b48c;}
#instructions{padding-bottom:10px;font-size:1.2em;text-align:center;}
#game-layout{display:flex;flex-direction:row;align-items:center;gap:20px;}
.side-panel{width:180px;height:750px;display:flex;flex-direction:column;overflow-y:auto;}
.p-card{margin-bottom:10px;padding:8px;border:1px solid #444;background:#111;}
.p-role{font-size:0.8em;color:#888;}
.p-main{display:flex;justify-content:space-between;align-items:center;font-size:1.2em;}
.p-num{color:#ffd700;font-weight:bold;}
h2{border-bottom:2px solid;padding-bottom:5px;margin-bottom:20px;text-align:center;}
</style>
<link href="https://fonts.googleapis.com/css?family=PixelMplus12&display=swap" rel="stylesheet">
</head>
<body>
<div id="instructions">矢印:移動、Z:パス、X:シュート、Space:ジャンプ</div>
<div id="game-layout">
  <div class="side-panel">
    <h2 style="color:#4169e1;border-color:#4169e1">HOME</h2>
    <div class="p-card"><div class="p-role">GK</div><div class="p-main"><span class="p-num">1</span><span>GEN</span></div></div>
    <div class="p-card"><div class="p-role">PLAYER</div><div class="p-main"><span class="p-num">10</span><span>YOU</span></div></div>
    <div class="p-card"><div class="p-role">PLAYER</div><div class="p-main"><span class="p-num">7</span><span>REN</span></div></div>
  </div>
  <canvas id="gameCanvas" width="1280" height="800"></canvas>
  <div class="side-panel">
    <h2 style="color:#dc143c;border-color:#dc143c">AWAY</h2>
    <div class="p-card"><div class="p-role">GK</div><div class="p-main"><span class="p-num">12</span><span>DAN</span></div></div>
    <div class="p-card"><div class="p-role">PLAYER</div><div class="p-main"><span class="p-num">9</span><span>ACE</span></div></div>
    <div class="p-card"><div class="p-role">PLAYER</div><div class="p-main"><span class="p-num">11</span><span>JIN</span></div></div>
  </div>
</div>
<script src="player_data.js"></script>
<script>
const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
const W=1200, H=700, P_W=16, P_H=56, B_R=5, P_SPD=3.8, B_SPD=9, G_W=40, G_H=220, G_Z=60, G_R=200, K_W=16, K_H=56, K_SPD=2.5, GRAV=0.3, M_X=40;
let score={p:0, o:0}, keeperHoldTimeout=null, isResetting=false, dribbleTimer=0, lastTouch='player', activeIdx=0, kickoff=false, lastSideOut=0, isHighFive=false;
let contactTimer=0, isFreeThrowMode=false;
let currentLevel = 0;
const levelKeys = ['away', 'opponent2', 'opponent3', 'opponent5', 'opponent6'];
const input={u:0,d:0,l:0,r:0, lastDx:1, lastDy:0};

const players=[], opponents=[];
let pKeeper={}, oKeeper={};
const ball={x:0,y:0,z:0,dx:0,dy:0,dz:0,r:B_R,c:'#fff',last:null,lob:false,caught:false,by:null,shooter:null};
const pGoal={x:-G_W,y:H/2-G_H/2,w:G_W,h:G_H}, oGoal={x:W,y:H/2-G_H/2,w:G_W,h:G_H};

function init(){
  players.length=0; opponents.length=0;
  // Reset vars
  contactTimer=0; isFreeThrowMode=false;
  const opKey = levelKeys[currentLevel];
  const opData = PLAYER_DATA[opKey];
  
  const isKakure = opData.teamName === 'かくれ高校';
  const isAllStar = opData.teamName === '選抜オールスター';
  const opColor = isKakure ? '#c4a47c' : '#dc143c';
  const opGkColor = isKakure ? '#c4a47c' : '#ff4500';

  const createPl = (d, isP, idx, total) => {
    const h = d.h * 0.32;
    const spd = 2.0 + (d.spd / 100) * 3.0; 
    const jmp = 3.5 + (d.jmp / 100) * 2.5; 
    const sht = 7.0 + (d.sht / 100) * 4.0; 
    const x = isP ? 250 : W-250-P_W;
    const spacing = H / (total + 1);
    const y = spacing * (idx + 1) - h/2;
    
    let pColor = isP ? '#4169e1' : opColor;
    if (!isP && d.name === '霞') pColor = '#c4a47c'; // 薄い茶色

    return {
      x, y, w: P_W, h, c: pColor, 
      dx:0, dy:0, has:false, z:0, dz:0,
      stats: { ...d, spd_val: spd, jmp_val: jmp, sht_val: sht }
    };
  };

  // Keepers
  const kp = PLAYER_DATA.home.gk;
  const ko = opData.gk;
  
  // Helper to calc stats
  const calcStats = (d) => ({
      ...d,
      spd_val: 2.0 + (d.spd / 100) * 3.0,
      jmp_val: 3.5 + (d.jmp / 100) * 2.5,
      sht_val: 7.0 + (d.sht / 100) * 4.0
  });

  pKeeper = { x:30, y:H/2-K_H/2, w:K_W, h:kp.h*0.32, c:'#00bfff', dy:0, stats: calcStats(kp) };
  
  // If opponent keeper is a field player (YANKEES), spawn them on field
  const okX = (ko.pos && ko.pos !== 'GK') ? W - 250 : W - 30 - K_W;
  oKeeper = { x:okX, y:H/2-K_H/2, w:K_W, h:ko.h*0.32, c: opGkColor, dy:0, stats: calcStats(ko) };

  // Field Players
  const hField = PLAYER_DATA.home.field;
  const aField = opData.field;
  hField.forEach((d, i) => players.push(createPl(d, true, i, hField.length)));
  aField.forEach((d, i) => opponents.push(createPl(d, false, i, aField.length)));
  
  updateSidePanels();
}

function updateSidePanels(){
  const opKey = levelKeys[currentLevel];
  const opData = PLAYER_DATA[opKey];
  
  const renderCard = (d, role) => `
    <div class="p-card" style="text-align:center">
      <div class="p-role">${d.pos || role}</div>
      <div class="p-main" style="justify-content:center; gap:10px"><span class="p-num">${d.no}</span><span>${d.name}</span></div>
      <div style="font-size:10px;color:#aaa">H:${d.h} S:${d.spd} J:${d.jmp}</div>
    </div>`;
    
  const pPanel = document.querySelectorAll('.side-panel')[0];
  const oPanel = document.querySelectorAll('.side-panel')[1];
  
  if(pPanel && oPanel){
      let pHtml = `<h2 style="color:#4169e1;border-color:#4169e1">${PLAYER_DATA.home.teamName}</h2>` +
                  renderCard(PLAYER_DATA.home.gk, 'GK');
      PLAYER_DATA.home.field.forEach(p => pHtml += renderCard(p, 'PLAYER'));
      pPanel.innerHTML = pHtml;

      let oHtml = `<h2 style="color:#dc143c;border-color:#dc143c">${opData.teamName}</h2>` +
                  renderCard(opData.gk, 'GK');
      opData.field.forEach(p => oHtml += renderCard(p, 'PLAYER'));
      oPanel.innerHTML = oHtml;
  }
}
function resolveColl(e){
  const cx=e.x+e.w/2, cy=e.y+e.h/2, gc=H/2;
  const dl=Math.hypot(cx, cy-gc);
  if(dl<G_R+e.w/2){
    const a=Math.atan2(cy-gc, cx);
    e.x=Math.cos(a)*(G_R+e.w/2)-e.w/2; e.y=gc+Math.sin(a)*(G_R+e.w/2)-e.h/2;
  }
  const dr=Math.hypot(cx-W, cy-gc);
  if(dr<G_R+e.w/2){
    const a=Math.atan2(cy-gc, cx-W);
    e.x=W+Math.cos(a)*(G_R+e.w/2)-e.w/2; e.y=gc+Math.sin(a)*(G_R+e.w/2)-e.h/2;
  }
}

function handleSideOut(){
  if(isResetting || Date.now()-lastSideOut<3000)return; 
  isResetting=true; lastSideOut=Date.now();
  
  if(players.some(p=>p.has)) lastTouch='player';
  if(opponents.some(o=>o.has)) lastTouch='opponent';

  players.forEach(p=>p.has=false); opponents.forEach(o=>o.has=false);

  const x=Math.max(0,Math.min(W,ball.x)), y=ball.y<H/2?0:H;
  const team=lastTouch==='player'?'opponent':'player';
  
  setTimeout(()=>{
    let ents=team==='player'?players:opponents;
    let near=ents[0], min=Infinity;
    ents.forEach(e=>{const d=Math.hypot(e.x-x,e.y-y);if(d<min){min=d;near=e;}});
    
    near.x=x-near.w/2; near.y=y?H-near.h-5: 5;
    near.dx=0; near.dy=0;

    let teammate = ents.find(e => e !== near);
    if(teammate) {
        let inward = near.x < W/2 ? 200 : -200;
        teammate.x = near.x + inward;
        teammate.y = H/2 - teammate.h/2; 
        teammate.dx=0; teammate.dy=0;
    }
    
    let defs=team==='player'?opponents:players, rx=team==='player'?W-300:300;
    
    // Check for defensive formation on side throw
    const isDefensiveThrow = (team === 'opponent' && x < W * 0.5);

    defs.forEach((e,i)=>{
        if(isDefensiveThrow && team === 'opponent'){ // Player team defending near own goal
             const angle = Math.atan2(y - H/2, x); // Angle from goal to ball
             const spreadRatio = (i / (defs.length - 1)) - 0.5; 
             const angleOffset = spreadRatio * 1.5; 
             const dist = G_R + 30;
             e.x = Math.cos(angle + angleOffset) * dist;
             e.y = H/2 + Math.sin(angle + angleOffset) * dist;
             if(e.x < 0) e.x = 0;
        } else {
             const spacing = H / (defs.length + 1);
             e.x=rx; 
             e.y=spacing * (i + 1) - e.h/2; 
        }
        e.dx=0; e.dy=0;
    });
    
    // YANKEES: Ensure Field Keeper is visible
    if(oKeeper.stats && oKeeper.stats.pos !== 'GK'){
        oKeeper.x = W - 250; 
        oKeeper.y = H/2 - 100;
        oKeeper.dx=0; oKeeper.dy=0;
    }

    ball.x=near.x+near.w/2; ball.y=near.y+near.h/2; ball.dx=ball.dy=ball.dz=0; ball.z=20;
    near.has=true; ball.last=null;
    near.hasMovedWithBall = false; near.stoppedAfterMove = false; near.dribbleFrames = 0; near.stopStartTime = 0;
    if(team==='player') activeIdx=players.indexOf(near);
    
    setTimeout(()=>{
        if(near.has && teammate){
             near.has = false;
             const a=Math.atan2(teammate.y-ball.y, teammate.x-ball.x);
             ball.x+=Math.cos(a)*40; ball.y+=Math.sin(a)*40;
             startPass(teammate, team);
             lastTouch=team;
             if(team==='player') activeIdx=players.indexOf(teammate);
        }
        isResetting=false;
    }, 2000);
  },1000);
}

function update(){
  if(!isResetting) checkContact();
  movePl(); moveOp(); moveKp(); moveBl(); checkColl(); checkGoal();
}

function checkContact(){
    if(isResetting) return; 
    
    const pHolder = players.find(p=>p.has);
    const oHolder = opponents.find(o=>o.has);
    
    if(pHolder && pHolder.x > W - 400 && !isFreeThrowMode){
        // 判定距離を短縮(50->35)し、抱え込むような密着時のみフリースロー判定にする
        const isContact = opponents.some(o => Math.hypot(o.x - pHolder.x, o.y - pHolder.y) < 35);
        if(isContact){
            contactTimer++;
            if(contactTimer > 15){ // 0.25 sec contact
                triggerFreeThrow(pHolder, 'player');
            }
        } else {
            contactTimer = 0;
        }
    } else if(oHolder && oHolder.x < 400 && !isFreeThrowMode){
        // 敵がボール保持時も同様に判定距離を短縮
        const isContact = players.some(p => Math.hypot(p.x - oHolder.x, p.y - oHolder.y) < 28);
        if(isContact){
            contactTimer++;
            if(contactTimer > 15){ 
                triggerFreeThrow(oHolder, 'opponent');
            }
        } else {
             contactTimer = 0;
        }
    } else {
        contactTimer = 0;
    }
}

function triggerFreeThrow(holder, team){
    contactTimer = 0;
    isResetting = true;
    isFreeThrowMode = true;
    
    setTimeout(() => {
        // Push defenders away (3m rule)
        const defenders = team === 'player' ? opponents : players;
        defenders.forEach(d => {
            const dist = Math.hypot(d.x - holder.x, d.y - holder.y);
            if(dist < 120){
                const a = Math.atan2(d.y - holder.y, d.x - holder.x);
                d.x = holder.x + Math.cos(a) * 140;
                d.y = holder.y + Math.sin(a) * 140;
                d.dx = 0; d.dy = 0;
            }
        });
        
        // Reset holder movement
        holder.dx = 0; holder.dy = 0;
        
        // If Opponent Free Throw, force AI to pass
        if(team === 'opponent'){
             // Force pass logic in moveOp
             holder.passTimer = Date.now(); // Start thinking
             holder.freeThrowAction = true;
        }
        
        setTimeout(() => { isResetting = false; }, 500); // Small delay before allowing contact checks again
    }, 1000);
}

function movePl(){
  if(isResetting)return;
  const holder=players.findIndex(p=>p.has);
  if(!kickoff){
    if(holder!==-1) activeIdx=holder;
    else {
      if(activeIdx>=players.length) activeIdx=0;
      const cur=players[activeIdx], curD=Math.hypot(cur.x-ball.x,cur.y-ball.y);
      players.forEach((p,i)=>{if(i!==activeIdx && Math.hypot(p.x-ball.x,p.y-ball.y)<curD-50) activeIdx=i;});
    }
  }
  players.forEach((p,i)=>{
    const SPD = p.stats.spd_val;
    if(i===activeIdx){
      p.dx=0; p.dy=0;
      if(!kickoff){
        if(p.has) {
            // Double Dribble Logic
            if (p.hasMovedWithBall === undefined) p.hasMovedWithBall = false;
            if (p.stoppedAfterMove === undefined) p.stoppedAfterMove = false;
            if (p.dribbleFrames === undefined) p.dribbleFrames = 0;
            if (p.stopStartTime === undefined) p.stopStartTime = 0;

            const isInput = input.u || input.d || input.l || input.r;

            if (p.stoppedAfterMove || (isFreeThrowMode && p.has)) {
                // 自由に動けない状態（ダブルドリブル後、またはフリースロー中）
                // 向きの変更は input.lastDx/Dy で管理されるため、ここでは移動速度を0のままにする
            } else {
                if(input.u)p.dy=-SPD; if(input.d)p.dy=SPD; if(input.l)p.dx=-SPD; if(input.r)p.dx=SPD;
                
                if (isInput) {
                    p.dribbleFrames++;
                    // Require continuous movement for > 5 frames to count as "dribbling"
                    if(p.dribbleFrames > 5) { 
                        p.hasMovedWithBall = true;
                    }
                    p.stopStartTime = 0; // Reset stop timer while moving
                } else {
                    // No input
                    if (p.hasMovedWithBall) {
                        // Has dribbled. Check for stop duration.
                        if (p.stopStartTime === 0) {
                            p.stopStartTime = Date.now();
                        } else if (Date.now() - p.stopStartTime > 100) {
                            // Stopped for more than 0.1s -> Lock
                            p.stoppedAfterMove = true;
                        }
                    } else {
                        // Stopped before reaching dribble threshold
                        p.dribbleFrames = 0;
                    }
                }
            }
        } else {
            // Not holding ball
            if(isFreeThrowMode) {
                // Lock movement during Free Throw (even if defending)
                p.dx = 0; p.dy = 0;
            } else {
                if(input.u)p.dy=-SPD; if(input.d)p.dy=SPD; if(input.l)p.dx=-SPD; if(input.r)p.dx=SPD;
            }
            p.hasMovedWithBall = false; 
            p.stoppedAfterMove = false;
            p.dribbleFrames = 0;
            p.stopStartTime = 0;
        }
      }
    } else {
      if(p.has){p.dx=0; p.dy=0; return;}
      
      const isBallFree = !players.some(x=>x.has) && !opponents.some(o=>o.has) && !ball.caught;
      let chasing = false;
      
      if(isBallFree){
          if(ball.lob && ball.last === 'player') chasing = true;
          else if (Math.hypot(p.x-ball.x, p.y-ball.y) < 200) chasing = true;
      }

      let tx,ty;
      if(chasing){
        tx = ball.x - p.w/2; ty = ball.y - p.h/2;
      } else {
          // 敵がボールを持っている、または敵のパス中（空中）であればディフェンスモード
          const isDefending = opponents.some(o=>o.has) || (ball.caught && ball.by === oKeeper) || (ball.last === 'opponent' && !ball.caught && !players.some(p=>p.has));
          
          const total = players.length;
          if(isDefending){
            if(ball.x > W * 0.8) {
                 // 敵がまだ敵陣深くにいる場合：センターライン手前で待ち構える
                 tx=500; 
                 ty = (H / (total + 1)) * (i + 1);
            } else {
               // 敵が移動し始めたら（閾値0.8）：ゴール前で扇状の壁を作る
               const angle = Math.atan2(ball.y - H/2, ball.x);
               const spreadRatio = (i / (total - 1)) - 0.5; 
               const angleOffset = spreadRatio * 1.8; 
               // ゴールエリア(G_R=200)の少し外側に壁を作る
               tx = Math.cos(angle + angleOffset) * (G_R + 30);
               ty = H/2 + Math.sin(angle + angleOffset) * (G_R + 30);
               if(tx < 0) tx = 0; 
            }
          } else {
            // オフェンスモード
            const pos = p.stats.pos;
            switch(pos){
                case 'LW': tx = W - 100; ty = 100; break;
                case 'LB': tx = W - 350; ty = 200; break;
                case 'CB': tx = W - 450; ty = H/2; break;
                case 'RB': tx = W - 350; ty = H - 200; break;
                case 'RW': tx = W - 100; ty = H - 100; break;
                case 'PV': tx = W - 230; ty = H/2; break;
                default: 
                    tx=ball.x-200; if(tx<50)tx=50; 
                    ty = (H / (total + 1)) * (i + 1);
            }
          }
      } // end if(chasing)

      // 共通移動ロジック
      let moveSpdMult = 1.3;
      const isDefendingForSpeed = opponents.some(o=>o.has) || (ball.caught && ball.by === oKeeper) || (ball.last === 'opponent' && !ball.caught && !players.some(p=>p.has));
      
      // ディフェンス時、すでに位置についていれば細かく動く
      if(!chasing && isDefendingForSpeed && ball.x <= W * 0.8 && Math.hypot(p.x - tx, p.y - ty) < 60) {
          moveSpdMult = 0.5; 
      }

      // Free Throw Defense Logic for Player Team
      if(isFreeThrowMode){
           const oHolder = opponents.find(o => o.has);
           if(oHolder){
                 const limit = 150; 
                 const distT = Math.hypot(tx - oHolder.x, ty - oHolder.y);
                 if(distT < limit){
                     const a = Math.atan2(ty - oHolder.y, tx - oHolder.x);
                     tx = oHolder.x + Math.cos(a) * limit;
                     ty = oHolder.y + Math.sin(a) * limit;
                 }
                 const distP = Math.hypot(p.x - oHolder.x, p.y - oHolder.y);
                 if(distP < limit){
                     const a = Math.atan2(p.y - oHolder.y, p.x - oHolder.x);
                     tx = oHolder.x + Math.cos(a) * (limit + 30);
                     ty = oHolder.y + Math.sin(a) * (limit + 30);
                 }
           }
      }

      if(p.x<tx-10)p.dx=SPD*moveSpdMult; else if(p.x>tx+10)p.dx=-SPD*moveSpdMult; else p.dx=0;
      if(p.y<ty-10)p.dy=SPD*moveSpdMult; else if(p.y>ty+10)p.dy=-SPD*moveSpdMult; else p.dy=0;
    } // end else (i!==activeIdx)
    p.x+=p.dx; p.y+=p.dy; resolveColl(p);    if(p.y<0)p.y+=SPD*0.2; if(p.y+p.h>H)p.y-=SPD*0.2; if(p.x<0)p.x=0; if(p.x+p.w>W)p.x=W-p.w;

    if(p.z > 0 || p.dz !== 0) {
      p.z += p.dz; p.dz -= GRAV;
      if(p.z <= 0) { p.z = 0; p.dz = 0; }
    }
  });
}

function moveOp(){
  if(isResetting || isHighFive)return;
  opponents.forEach((o,i)=>{
    const SPD = o.stats.spd_val;
    if(kickoff) {o.dx=0; o.dy=0; return;}
    if(o.has){
      if(kickoff) {o.dx=0; o.dy=0;}
      else {
        // Free Throw Logic for Opponent
        if(isFreeThrowMode) {
             o.dx = 0; o.dy = 0;
             // AI decides to pass
             if(o.freeThrowAction && !o.passTarget){
                 let mates = opponents.filter(m => m !== o);
                 // Include Keeper if field players are blocked/scarce
                 if(mates.length === 0 || Math.random() < 0.2) mates.push(oKeeper);
                 mates = mates.filter(m => m !== o); // Re-filter to be safe

                 if(mates.length > 0){
                     // Prefer back pass or parallel
                     const safeMates = mates.filter(m => m.x > o.x - 50); 
                     if(safeMates.length > 0){
                          o.passTarget = safeMates[Math.floor(Math.random() * safeMates.length)];
                     } else {
                          // Panic pass to anyone
                          o.passTarget = mates[Math.floor(Math.random() * mates.length)];
                     }
                     o.passTimer = Date.now();
                 } else {
                     // Fallback: Force pass to Keeper if no one else is found
                     o.passTarget = oKeeper;
                     o.passTimer = Date.now();
                 }
                 o.freeThrowAction = false; // Decision made
             }
        }

        // Pause for 0.5s after catch to settle/fake
        if(o.catchTime && Date.now() - o.catchTime < 500) {
            o.dx = 0; o.dy = 0;
            return;
        }

        // AI Pass Logic
        if(o.passTarget){
            o.dx=0; o.dy=0; // Stop to pass
            
            // Failsafe: If too close to goal, cancel pass and shoot instead
            // BUT: In Free Throw Mode, we MUST pass (cannot shoot directly)
            if(o.x < 300 && !isFreeThrowMode) {
                o.passTarget = null;
                // Fall through to movement/shoot logic
            } else if(Date.now() - o.passTimer > 500){ // 0.5s delay
                 o.has = false;
                 ball.last = 'opponent'; lastTouch = 'opponent';
                 ball.shooter = o;
                 ball.x = o.x - B_R; ball.y = o.y + o.h/2;
                 
                 const target = o.passTarget;
                 const a = Math.atan2(target.y - ball.y, target.x - ball.x);
                 ball.x += Math.cos(a) * 30; ball.y += Math.sin(a) * 30;
                 
                 startPass(target, 'opponent');
                 o.passTarget = null;
                 return;
            } else {
                return; // Wait for timer
            }
        } 
        
        if(!o.throw && o.x > 350 && Math.random() < 0.1) {
            const mates = opponents.filter(m => m !== o);
            // Look for teammates ahead or parallel (support)
            const forwardMates = mates.filter(m => m.x < o.x + 50);
            
            if(forwardMates.length > 0){
                // Pick random suitable teammate for variety
                const target = forwardMates[Math.floor(Math.random() * forwardMates.length)];
                o.passTarget = target;
                o.passTimer = Date.now();
                return; // Start waiting
            }
        }

        let tx=250, ty=H/2;
        // Move Logic (Skip if Free Throw Mode)
        if(!isFreeThrowMode){
            if(o.x>tx) {o.x-=SPD*0.4; o.dx=-SPD*0.4;}  
            else if(o.x<tx-50) {o.x+=SPD*0.4; o.dx=SPD*0.4;} else o.dx=0;
            if(o.y<ty-20) {o.y+=SPD*0.3; o.dy=SPD*0.3;}
            else if(o.y>ty+20) {o.y-=SPD*0.3; o.dy=-SPD*0.3;} else o.dy=0;
        }
        
        // --- Counter Attack & Jump Shoot Logic ---
        // Check if 1-on-1 with Keeper (No defenders in front)
        let defendersInFront = players.some(p => p.x < o.x && Math.abs(p.y - o.y) < 100);
        
        if(!isFreeThrowMode && !o.throw && o.x < 350 && !defendersInFront) {
            // High chance to Jump Shoot in 1-on-1
            if(Math.random() < 0.8 && o.z === 0) {
                o.dz = 7; // Jump!
            }
            
            // Hang time logic: Pause gravity at peak
            if(o.z > 20 && Math.abs(o.dz) < 1.5 && !o.hangStart){
                o.hangStart = Date.now();
                o.dz = 0; // Stop vertical movement
            }
            
            // Shoot during hang time or near goal
            if(o.hangStart || o.x < 200){
                o.throw = true;
                const cornerY = (o.y < H/2) ? H/2 + 80 : H/2 - 80; 
                
                // Shoot after a brief hang (e.g., 100ms)
                setTimeout(()=>{
                    if(o.has) {
                        shoot(o, 'opponent');
                        ball.dy = (cornerY - ball.y) * 0.05; 
                        ball.dx = -16; 
                        
                        // Release gravity after shot
                        setTimeout(() => { o.hangStart = null; o.dz = -1; }, 200);
                    }
                }, 150);
                return;
            }
        }

        // Force shoot if close to goal area or reached target (Normal shot)
        if(!o.throw && (o.x<=tx+100 || o.x < 250)){
          o.throw=true; setTimeout(()=>{if(o.has) shoot(o,'opponent');},500);
        }
      }
    } else {
      if(o.retr && ball.last==='oKeeper') o.retr=false;
      if(o.retr){
        if(o.x<W*0.75) o.x+=SPD*0.8; else o.retr=false;
      } else {
        const pHas=players.some(p=>p.has)||(ball.caught&&ball.by===pKeeper)||(ball.last==='pKeeper'&&ball.x<W/2)||(ball.x<150);
        
        // Chase Logic: If ball is free (no one has it), chase it!
        const isBallFree = !players.some(p=>p.has) && !opponents.some(op=>op.has) && !ball.caught;
        let tx, ty;
        const total = opponents.length;

        if(isBallFree && ball.z < 30) {
            // Chase the ball
            tx = ball.x; ty = ball.y;
        } else {
            // Normal Positioning Logic
            tx=ball.x; ty=ball.y;
            if(pHas){
              if(o.stats && o.stats.name === '銀次'){
                 const holder = players.find(p=>p.has);
                 if(holder){
                   const predictFrames = 15;
                   tx = holder.x + (holder.dx || 0) * predictFrames + 30;
                   ty = holder.y + (holder.dy || 0) * predictFrames;
                 } else {
                   tx = W - 350; ty = H/2;
                 }
              } else if(ball.x<W*0.2) {
                tx=W-G_R-100; 
                ty = (H / (total + 1)) * (i + 1);
              } else {
                const angle = Math.atan2(ball.y - H/2, ball.x - W);
                // Spread up to 6 players along the arc
                const spreadRatio = (i / (total - 1)) - 0.5; // -0.5 to 0.5
                const angleOffset = spreadRatio * 2.0; // roughly -1 to 1 radians
                tx = W + Math.cos(angle + angleOffset) * (G_R + 15);
                ty = H/2 + Math.sin(angle + angleOffset) * (G_R + 15);
              }
            } else {
                // Offense Formation based on Position (Attacking Left Goal)
                const pos = o.stats.pos;
                switch(pos){
                    // Note: For opponents attacking left, RW is Top (Y=small), LW is Bottom (Y=large)
                    case 'RW': tx = 100; ty = 100; break;
                    case 'RB': tx = 350; ty = 200; break;
                    case 'CB': tx = 450; ty = H/2; break;
                    case 'LB': tx = 350; ty = H - 200; break;
                    case 'LW': tx = 100; ty = H - 100; break;
                    case 'PV': tx = 230; ty = H/2; break;
                    default:
                        ty = (H / (total + 1)) * (i + 1);
                        tx = ball.x + 100 + (i % 2) * 40;
                }
            }
        }
        
        // Minor separation from teammates if not chasing hard
        if(!isBallFree) {
            const mate=opponents.find((_,ix)=>ix!==i);
            if(mate && Math.hypot(o.x-mate.x,o.y-mate.y)<50){
              if(o.y<mate.y)ty-=40; else ty+=40; if(o.x<mate.x)tx-=40; else tx+=40;
            }
        }

        // Free Throw Mode: Keep distance from ball holder (3m rule)
        if(isFreeThrowMode){
            const holder = players.find(p => p.has) || opponents.find(op => op.has);
            if(holder && holder !== o){
                 const limit = 150; 
                 // Adjust Target (tx, ty) to be outside the limit circle
                 const distT = Math.hypot(tx - holder.x, ty - holder.y);
                 if(distT < limit){
                     const a = Math.atan2(ty - holder.y, tx - holder.x);
                     tx = holder.x + Math.cos(a) * limit;
                     ty = holder.y + Math.sin(a) * limit;
                 }
                 // If currently too close, move away actively
                 const distO = Math.hypot(o.x - holder.x, o.y - holder.y);
                 if(distO < limit){
                     const a = Math.atan2(o.y - holder.y, o.x - holder.x);
                     tx = holder.x + Math.cos(a) * (limit + 30);
                     ty = holder.y + Math.sin(a) * (limit + 30);
                 }
            }
        }
        
        // Defensive Arc Speed Reduction
        let movSpd = SPD * 0.5;
        if(pHas && ball.x >= W * 0.2) {
            movSpd = SPD * 0.25; // Slower in defensive arc
        }

        const cy=o.y+o.h/2, cx=o.x+o.w/2;
        if(cy<ty-4){o.y+=movSpd;o.dy=movSpd;} else if(cy>ty+4){o.y-=movSpd;o.dy=-movSpd;} else o.dy=0;
        if(cx>tx+4){o.x-=movSpd;o.dx=-movSpd;} else if(cx<tx-4){o.x+=movSpd;o.dx=movSpd;} else o.dx=0;
      }
    }
    o.x+=o.dx; o.y+=o.dy; resolveColl(o);
    if(o.y<0)o.y+=SPD*0.2; if(o.y+o.h>H)o.y-=SPD*0.2; if(o.x<0)o.x=0; if(o.x+o.w>W)o.x=W-o.w;

    if(o.z > 0 || o.dz !== 0) {
      if(!o.hangStart) { // Only apply gravity if not hanging
          o.z += o.dz; o.dz -= GRAV;
          if(o.z <= 0) { o.z = 0; o.dz = 0; }
      }
    }
  });
}

function moveKp(){
  if(isResetting)return;
  const logic=(k,isP)=>{
    // Check for Field Player Keeper (YANKEES Strategy)
    if(!isP && k.stats && k.stats.pos !== 'GK') {
        const SPD = k.stats.spd_val;
        const o = k; // alias
        
        // Field Logic (Simplified moveOp)
        if(o.has){
            // Keeper holding ball -> Attack/Pass
             if(!o.throw && Math.random() < 0.05) { // Pass logic
                const mates = opponents.filter(m => m !== o); // Keeper passes to field players
                const forwardMates = mates.filter(m => m.x < o.x + 50);
                if(forwardMates.length > 0){
                    const target = forwardMates[Math.floor(Math.random() * forwardMates.length)];
                    o.has = false; ball.last = 'opponent'; lastTouch = 'opponent'; ball.shooter = o;
                    ball.x = o.x - B_R; ball.y = o.y + o.h/2;
                    const a = Math.atan2(target.y - ball.y, target.x - ball.x);
                    ball.x += Math.cos(a) * 30; ball.y += Math.sin(a) * 30;
                    startPass(target, 'opponent');
                    return;
                }
            }
            // Move with ball
            let tx=250, ty=H/2;
            if(o.x>tx) {o.x-=SPD*0.4;} else if(o.x<tx-50) {o.x+=SPD*0.4;}
            if(o.y<ty-20) {o.y+=SPD*0.3;} else if(o.y>ty+20) {o.y-=SPD*0.3;}
            
            if(!o.throw && (o.x<=tx+100 || o.x < 250)){
              o.throw=true; setTimeout(()=>{if(o.has) shoot(o,'opponent');},500);
            }
        } else {
             // Without ball -> Defend/Support
             const pHas=players.some(p=>p.has);
             // Chase free ball
             const isBallFree = !players.some(p=>p.has) && !opponents.some(op=>op.has) && !ball.caught;
             
             let tx, ty;
             if(isBallFree && ball.z < 30) {
                 tx = ball.x; ty = ball.y;
             } else {
                 if(pHas){
                     // ストーカーモード改：ボール保持者の進行方向の少し前に立ちふさがる
                     const holder = players.find(p=>p.has);
                     if(holder) {
                         // 保持者が移動中なら、その進行方向の先（例: 20フレーム先）を予測位置とする
                         // 移動していなければ現在位置の少し前（ゴール側）に立つ
                         const predictFrames = 20; 
                         
                         if(Math.abs(holder.dx) > 0.1 || Math.abs(holder.dy) > 0.1){
                             tx = holder.x + holder.dx * predictFrames;
                             ty = holder.y + holder.dy * predictFrames;
                         } else {
                             // 止まっている場合はゴール方向（X軸プラス方向）の少し前に立つ
                             tx = holder.x + 50; 
                             ty = holder.y;
                         }
                     } else {
                         tx = W - 350; ty = H/2; 
                     }
                 } else {
                     // Support Offense
                     if(k.stats.pos === 'PV2'){
                        tx = 230; ty = H/2 - 100; // Offset Y for PV2
                     } else {
                        tx = 230; ty = H/2; // Standard PV
                     }
                 }
             }
             
             if(k.y<ty-4)k.y+=SPD*0.8; else if(k.y>ty+4)k.y-=SPD*0.8;
             if(k.x>tx+4)k.x-=SPD*0.8; else if(k.x<tx-4)k.x+=SPD*0.8;
        }
        
        // Collisions
        if(k.y<0)k.y=0; if(k.y+k.h>H)k.y=H-k.h; if(k.x<0)k.x=0; if(k.x+k.w>W)k.x=W-k.w;
        resolveColl(k);
        
        // YANKEES Special Rule: Ball stuck in empty goal area -> Restart
        const distToGoal = Math.hypot(ball.x - W, ball.y - H/2);
        if(!isResetting && distToGoal < G_R && Math.abs(ball.dx) < 0.5 && Math.abs(ball.dy) < 0.5 && ball.z < 1){
            isResetting = true;
            setTimeout(() => {
                reset(false); // Restart with opponent ball
                isResetting = false;
            }, 2000);
        }
        
        return;
    }

    const cy=k.y+k.h/2, r=G_R, cx=isP?0:W;
    let tx=isP?30:W-30-K_W;
    if((isP?ball.x<W/2&&ball.dx<0:ball.x>W/2&&ball.dx>0) || (isP?ball.x<r:ball.x>W-r)&&Math.abs(ball.dx)<1){
      let dx=ball.x; if(isP) tx=Math.min(r-20,dx); else {if(dx<W-r+20)dx=W-r+20; tx=dx-K_W;}
    }
    if(k.x<tx)k.x+=K_SPD; else if(k.x>tx)k.x-=K_SPD;
    const dx=k.x+k.w/2-cx, maxY=Math.sqrt(Math.max(0,r*r-dx*dx));
    let ty=ball.y; if(ty<H/2-maxY)ty=H/2-maxY; if(ty>H/2+maxY)ty=H/2+maxY;
    if(cy<ty-K_SPD)k.y+=K_SPD; else if(cy>ty+K_SPD)k.y-=K_SPD;
    if(k.y<0)k.y=0; if(k.y+k.h>H)k.y=H-k.h; if(k.x<0)k.x=0; if(!isP && k.x+k.w>W)k.x=W-k.w;
  };
  logic(pKeeper,true); logic(oKeeper,false);
}

function moveBl(){
  if(ball.caught&&ball.by){ball.x=ball.by.x+ball.by.w/2; ball.y=ball.by.y+ball.by.h/2; ball.z=25; return;}
  let h=null; players.forEach(p=>{if(p.has)h=p;}); opponents.forEach(o=>{if(o.has)h=o;});
  if(h){
    if(h.dx||h.dy){dribbleTimer+=0.15; ball.z=(h.z||0)+Math.abs(Math.sin(dribbleTimer))*20; ball.x=h.x+h.w/2+(h.dx>0?8:-8); ball.y=h.y+h.h/2;}
    else{ball.x=h.x+h.w/2; ball.y=h.y+h.h/2; ball.z=(h.z||0)+20; dribbleTimer=0;}
    ball.dx=ball.dy=ball.dz=0; ball.lob=false; return;
  }
  ball.x+=ball.dx; ball.y+=ball.dy;
  if(ball.lob||ball.z>0){
    ball.z+=ball.dz; ball.dz-=GRAV;
    if(ball.lob){
      let t=null; if(ball.last==='pKeeper')t=players[0]; else if(ball.last==='oKeeper')t=opponents[0];
      if(t){
        const a=Math.atan2(t.y-ball.y,t.x-ball.x), s=Math.sqrt(ball.dx**2+ball.dy**2);
        ball.dx=ball.dx*0.9+Math.cos(a)*s*0.1; ball.dy=ball.dy*0.9+Math.sin(a)*s*0.1;
      }
    }
    if(ball.z<=0){ball.z=0; ball.dz=0; ball.lob=false; ball.dx*=0.85; ball.dy*=0.85;}
  } else {
    ball.dx*=0.95; ball.dy*=0.95; if(Math.abs(ball.dx)<0.1)ball.dx=0; if(Math.abs(ball.dy)<0.1)ball.dy=0;
  }
}

function checkColl(){
  // Allow higher catch for friendly passes (Jump catch)
  const catchHeight = (ball.last === 'player') ? 80 : P_H;
  if(ball.z > catchHeight) return;
  
  if(ball.y<-B_R || ball.y>H+B_R){handleSideOut();return;}
  if(players.some(p=>p.has)||opponents.some(o=>o.has)||ball.caught)return;
  
  // Dynamic collision box based on speed to prevent tunneling (CCD-lite)
  const padding = 2;
  const minX = Math.min(ball.x, ball.x - ball.dx) - B_R - padding;
  const minY = Math.min(ball.y, ball.y - ball.dy) - B_R - padding;
  const maxX = Math.max(ball.x, ball.x - ball.dx) + B_R + padding;
  const maxY = Math.max(ball.y, ball.y - ball.dy) + B_R + padding;
  
  const bx = {x: minX, y: minY, w: maxX - minX, h: maxY - minY};
  
  if(ball.last!=='player' || ball.lob || ball.z===0){
    for(const p of players){
      // Prevent shooter from catching their own ball immediately
      if(ball.shooter === p) continue;

      // Larger catch range for teammates to make catching easier
      const catchMargin = (ball.last==='player' && ball.lob) ? 12 : 0;
      const px = p.x - catchMargin, py = p.y - catchMargin;
      const pw = p.w + catchMargin*2, ph = p.h + catchMargin*2;

      if(bx.x < px + pw && bx.x + bx.w > px && bx.y < py + ph && bx.y + bx.h > py){
        p.has=true; ball.last=null; lastTouch='player'; 
        p.hasMovedWithBall = false; p.stoppedAfterMove = false; p.dribbleFrames = 0; p.stopStartTime = 0;
        if(kickoff) kickoff=false; 
        
        // Pass complete logic for Free Throw
        if(isFreeThrowMode && !players.find(pl => pl === ball.shooter)){
            isFreeThrowMode = false;
        } else if (isFreeThrowMode && ball.shooter !== p) {
             isFreeThrowMode = false;
        }
        
        // Snap ball to player immediately to fix visual lag
        ball.x = p.x + p.w/2; ball.y = p.y + p.h/2;
        ball.dx = 0; ball.dy = 0; ball.z = 20;
        return;
      }
    }
  }
  if(ball.last!=='opponent' || ball.lob || ball.z===0){
    for(const o of opponents){
      // Prevent shooter from catching their own ball immediately
      if(ball.shooter === o) continue;
      
      // Opponents cannot catch high lob passes (must wait for ball to drop)
      if(ball.lob && ball.last === 'player' && ball.z > 25) continue;

      if(bx.x<o.x+o.w && bx.x+bx.w>o.x && bx.y<o.y+o.h && bx.y+bx.h>o.y){
        o.has=true; ball.last=null; lastTouch='opponent'; 
        o.catchTime = Date.now(); // Record catch time for delay logic
        if(kickoff) kickoff=false;
        isFreeThrowMode = false; // Reset on turnover
        ball.x = o.x + o.w/2; ball.y = o.y + o.h/2; // Snap
        ball.dx = 0; ball.dy = 0; ball.z = 20;
        return;
      }
    }
  }
  if(ball.dx<0 && bx.x<pKeeper.x+pKeeper.w && bx.x+bx.w>pKeeper.x && bx.y<pKeeper.y+pKeeper.h && bx.y+bx.h>pKeeper.y){
    if(ball.last==='opponent') opponents.forEach(o=>o.retr=true);
    lastTouch='player'; 
    let t = players[0], min=Infinity; players.forEach(p=>{const d=Math.hypot(p.x-pKeeper.x,p.y-pKeeper.y);if(d<min){min=d;t=p;}});
    catchPass(pKeeper, t, 'pKeeper');
  }
  if(ball.dx>0 && bx.x<oKeeper.x+oKeeper.w && bx.x+bx.w>oKeeper.x && bx.y<oKeeper.y+oKeeper.h && bx.y+bx.h>oKeeper.y){
    lastTouch='opponent'; 
    let t = opponents[0], min=Infinity; opponents.forEach(o=>{const d=Math.hypot(o.x-oKeeper.x,o.y-oKeeper.y);if(d<min){min=d;t=o;}});
    catchPass(oKeeper, t, 'oKeeper');
  }
}

function catchPass(k,t,name){
  ball.caught=true; ball.by=k; ball.dx=ball.dy=ball.dz=0; ball.x=k.x+k.w/2; ball.y=k.y+k.h/2;
  keeperHoldTimeout=setTimeout(()=>{
    ball.caught=false; ball.by=null; 
    
    const dist = Math.hypot(t.x - ball.x, t.y - ball.y);
    
    // Hand-off if very close
    if(dist < 60){
        t.has = true;
        ball.last = name === 'pKeeper' ? 'player' : 'opponent'; 
        lastTouch = ball.last;
        if(ball.last === 'player') {
             t.hasMovedWithBall = false; t.stoppedAfterMove = false; t.dribbleFrames = 0; t.stopStartTime = 0;
             if(isFreeThrowMode) isFreeThrowMode = false;
        }
        // Sync ball to holder immediately
        ball.x = t.x + t.w/2; ball.y = t.y + t.h/2; ball.z = 20;
        return;
    }

    const a=Math.atan2(t.y-ball.y, t.x-ball.x);
    // Dynamic offset
    let offset = 50;
    if(dist < 100) offset = dist * 0.4; // Reduced offset for medium range
    
    ball.x+=Math.cos(a)*offset; ball.y+=Math.sin(a)*offset;
    startPass(t,name);
  },1000);
}

function startPass(t,name){
  const dist=Math.hypot(t.x-ball.x, t.y-ball.y);
  ball.last=name; const a=Math.atan2(t.y-ball.y, t.x-ball.x);
  ball.lob=true; ball.z=0; ball.dz=dist<300?4:(dist<600?6:8);
  let s=(dist*GRAV)/(2*ball.dz); if(s>18){s=18; ball.dz=(dist*GRAV)/(2*s);}
  ball.dx=Math.cos(a)*s; ball.dy=Math.sin(a)*s;
}

function checkGoal(){
  if(isResetting || isHighFive)return; if(players.some(p=>p.has)||opponents.some(o=>o.has)||ball.z>G_Z)return;
  if(isFreeThrowMode && ball.x > W - 100) return; // No goal on direct free throw

  if(ball.x-B_R<=pGoal.x+pGoal.w){
    if(ball.y+B_R>pGoal.y && ball.y-B_R<pGoal.y+pGoal.h){
      score.o++; isResetting=true; 
      startHighFive('opponent');
    } else if(ball.x+B_R<0) handleOut(true);
  }
  if(ball.x+B_R>=oGoal.x){
    if(ball.y+B_R>oGoal.y && ball.y-B_R<oGoal.y+oGoal.h){
      score.p++; isResetting=true; 
      startHighFive('player');
    } else if(ball.x-B_R>W) handleOut(false);
  }
}

function startHighFive(team){
  isHighFive = true;
  const ents = team === 'player' ? players : opponents;
  
  // Scorer determination
  let scorer = null;
  if(ball.shooter && ents.includes(ball.shooter)){
      scorer = ball.shooter;
  } else {
      // Fallback to closest to goal
      const goalX = team === 'player' ? W : 0;
      let minD = Infinity;
      ents.forEach(e => {
        const d = Math.abs(e.x - goalX);
        if(d < minD) { minD = d; scorer = e; }
      });
  }
  
  let phase = 0; 
  let jumpCount = 0;

  const celebrate = () => {
    if(!isHighFive) return;
    
    // Jump logic
    if(phase === 0) { // Start Jump
      scorer.dz = 6; 
      phase = 1;
    } else if(phase === 1) { // In Air
      scorer.z += scorer.dz; scorer.dz -= GRAV;
      if(scorer.z <= 0) { 
        scorer.z = 0; scorer.dz = 0; 
        jumpCount++;
        if(jumpCount < 2) {
            setTimeout(() => { phase = 0; celebrate(); }, 200); // Wait briefly before next jump
            return;
        } else {
            phase = 2; // Done jumping, start walking back
        }
      }
    } else if(phase === 2) {
      // Walk back to own side
      const targetX = team === 'player' ? 400 : W - 400; 
      let allArrived = true;
      const total = ents.length;
      
      ents.forEach((e, i) => {
          // Spread Y positions for up to 6 players
          const spacing = H / (total + 1);
          const targetY = spacing * (i + 1) - e.h/2;
          const dx = targetX - e.x;
          const dy = targetY - e.y;
          
          if(Math.hypot(dx, dy) > 10) {
              e.x += dx * 0.05;
              e.y += dy * 0.05;
              allArrived = false;
          }
      });
      
      // YANKEES: Move Field Keeper back too
      if(team === 'opponent' && oKeeper.stats && oKeeper.stats.pos !== 'GK'){
          const tx = W - 250;
          const ty = H/2 - 100;
          const dx = tx - oKeeper.x;
          const dy = ty - oKeeper.y;
          if(Math.hypot(dx, dy) > 10) {
              oKeeper.x += dx * 0.05;
              oKeeper.y += dy * 0.05;
              allArrived = false;
          }
      }
      
      if(allArrived) phase = 3;
      
    } else if(phase === 3) {
      // Check for Match End
      if(score.p >= 3) {
          if(currentLevel < levelKeys.length - 1) {
              // Next Level
              currentLevel++;
              score.p = 0; score.o = 0;
              alert(`WIN! NEXT OPPONENT: ${PLAYER_DATA[levelKeys[currentLevel]].teamName}`);
              isHighFive = false;
              init(); reset(true); isResetting=false;
          } else {
              // Game Clear
              alert("CONGRATULATIONS! ALL TEAMS DEFEATED!");
              isHighFive = false;
              // Reset to first level? Or stay? Let's reset to first for endless play
              currentLevel = 0; score.p = 0; score.o = 0;
              init(); reset(true); isResetting=false;
          }
      } else if(score.o >= 3) {
          // Game Over
          alert("GAME OVER...");
          location.reload(); // Simple reload to restart
      } else {
          // Continue Match
          isHighFive = false;
          setTimeout(()=>{ reset(team !== 'player'); isResetting=false; }, 500);
      }
      return;
    }
    
    if(phase >= 1 && phase <= 3) requestAnimationFrame(celebrate);
  };
  celebrate();
}

function handleOut(isP){
  resetPos(); setTimeout(()=>{
    if(isP){ball.x=pKeeper.x+pKeeper.w+B_R; ball.y=pKeeper.y+pKeeper.h/2; startPass(players[0],'pKeeper');}
    else {
        // If Keeper is Field Player (YANKEES), restart from center (Kickoff) instead of Goal Throw
        if(oKeeper.stats.pos !== 'GK'){
            reset(false);
            return;
        }

        // Spread opponents for goal throw
        const total = opponents.length;
        opponents.forEach((o, i) => {
            const spacing = H / (total + 1);
            o.x = W - 300 - (i % 2) * 40; 
            o.y = spacing * (i + 1) - o.h/2;
        });
        
        ball.x=oKeeper.x-B_R; ball.y=oKeeper.y+oKeeper.h/2; 
        startPass(opponents[0],'oKeeper');
    }
  },1000);
}

function resetPos(){
  clearTimeout(keeperHoldTimeout); init();
  pKeeper.y=H/2-K_H/2; oKeeper.y=H/2-K_H/2;
  ball.dx=ball.dy=ball.dz=ball.z=0; ball.last=null; ball.lob=false; ball.caught=false; ball.by=null; dribbleTimer=0;
}

function reset(pStart){
  resetPos(); kickoff=true;
  lastTouch = pStart ? 'player' : 'opponent';
  const cy=H/2, cx=W/2;
  if(pStart){
    activeIdx=0;
    players[0].x=cx-60; players[0].y=cy+50; // Player (User)
    players[1].x=cx-60; players[1].y=cy-50; // Teammate
    players[1].has=true;
    players[1].hasMovedWithBall = false; players[1].stoppedAfterMove = false; players[1].dribbleFrames = 0; players[1].stopStartTime = 0;
    ball.x=players[1].x+players[1].w/2; ball.y=players[1].y+players[1].h/2; ball.z=20;
    setTimeout(()=>{
      if(players[1].has){
        players[1].has=false; 
        const target=players[0];
        const dist=Math.hypot(target.x-ball.x, target.y-ball.y);
        const frames=80; // Duration of the pass in frames (approx 1.3s)
        const a=Math.atan2(target.y-ball.y, target.x-ball.x);
        
        ball.last='player'; ball.lob=true; ball.z=0;
        // Physics: z = Vz*t - 0.5*g*t^2. We want z=0 at t=frames.
        // Vz = 0.5 * GRAV * frames
        ball.dz = 0.5 * GRAV * frames;
        
        // Horizontal speed: dist = speed * frames
        const s = dist / frames;
        ball.dx = Math.cos(a) * s;
        ball.dy = Math.sin(a) * s;
        
        // Initial offset to prevent self-collision
        ball.x=players[1].x+players[1].w/2+Math.cos(a)*10; 
        ball.y=players[1].y+players[1].h/2+Math.sin(a)*10;
      }
    },1000);
  } else {
    opponents[0].x=cx+120; opponents[0].y=cy; // Receiver
    opponents[1].x=cx+240; opponents[1].y=cy; // Passer
    opponents[1].has=true;
    ball.x=opponents[1].x+opponents[1].w/2; ball.y=opponents[1].y+opponents[1].h/2; ball.z=20;
    setTimeout(()=>{
      if(opponents[1].has){
        opponents[1].has=false; 
        const a=Math.atan2(opponents[0].y-opponents[1].y, opponents[0].x-opponents[1].x);
        ball.x=opponents[1].x+opponents[1].w/2+Math.cos(a)*20; ball.y=opponents[1].y+opponents[1].h/2+Math.sin(a)*20;
        startPass(opponents[0],'opponent');
        ball.dz=7; ball.dx*=0.6; ball.dy*=0.6;
      }
    },1000);
  }
}

function shoot(tr, type){
  if(isFreeThrowMode && type === 'opponent') return; // Opponent cannot shoot directly in Free Throw

  tr.has=false; tr.throw=false; ball.last=type; lastTouch=type;
  ball.shooter = tr;
  ball.x=tr.x+(type==='player'?tr.w+B_R:-B_R); ball.y=tr.y+tr.h/2; ball.dz=4;
  const speed = tr.stats ? tr.stats.sht_val : B_SPD;
  if(type==='opponent'){ball.dx=-speed; ball.dy=(Math.random()-0.5)*8;}
}

function render(){
  const SH=100;
  const CW=canvas.width;
  ctx.clearRect(0,0,CW,H+SH); 
  
  // --- Scoreboard Area ---
  ctx.fillStyle='#333'; ctx.fillRect(0,0,CW,SH); // Background wall
  
  // Scoreboard Object
  const bx=CW/2-100, by=10, bw=200, bh=60;
  
  // Legs
  ctx.fillStyle='#8b5a2b'; 
  ctx.fillRect(bx+20, by+bh, 6, SH-(by+bh));
  ctx.fillRect(bx+bw-26, by+bh, 6, SH-(by+bh));

  // Board
  ctx.fillStyle='#1a3300'; // Dark Green Chalkboard
  ctx.fillRect(bx, by, bw, bh);
  ctx.lineWidth=3; ctx.strokeStyle='#8b5a2b'; // Wood Frame
  ctx.strokeRect(bx, by, bw, bh);

  // Text "得点板"
  ctx.textAlign='center'; 
  ctx.fillStyle='#fff'; ctx.font='16px "PixelMplus12"';
  ctx.fillText("得 点 板", CW/2, by+18);

  // Score Boxes (Yellow)
  const boxW=40, boxH=30, pad=10;
  ctx.fillStyle='#ffd700'; // Yellow
  ctx.fillRect(CW/2-boxW-pad, by+25, boxW, boxH);
  ctx.fillRect(CW/2+pad, by+25, boxW, boxH);

  // Scores (Red, 2-digit)
  ctx.font='24px "PixelMplus12"';
  ctx.fillStyle='#ff0000'; // Red
  const sp=score.p.toString().padStart(2,'0');
  const so=score.o.toString().padStart(2,'0');
  ctx.fillText(sp, CW/2-boxW/2-pad, by+48); 
  ctx.fillText("-", CW/2, by+45);
  ctx.fillText(so, CW/2+boxW/2+pad, by+48);

  // --- Game Field (Translated) ---
  ctx.save();
  ctx.translate(M_X, SH);

  ctx.fillStyle='#d2b48c'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#fff'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(0,H/2,G_R,-Math.PI/2,Math.PI/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,H); ctx.stroke();
  ctx.beginPath(); ctx.arc(W,H/2,G_R,Math.PI/2,3*Math.PI/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(W,H); ctx.stroke();
  ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
  const drawGoal3D = (g, isLeft) => {
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    const mouthX = isLeft ? g.x + g.w : g.x, backX = isLeft ? g.x : g.x + g.w;
    const y1 = g.y, y2 = g.y + g.h, z = G_Z;
    // Mouth
    ctx.beginPath(); ctx.moveTo(mouthX, y1); ctx.lineTo(mouthX, y1-z); ctx.lineTo(mouthX, y2-z); ctx.lineTo(mouthX, y2); ctx.stroke();
    // Back & Depth
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.moveTo(backX, y1); ctx.lineTo(backX, y1-z); ctx.lineTo(backX, y2-z); ctx.lineTo(backX, y2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mouthX, y1); ctx.lineTo(backX, y1); ctx.moveTo(mouthX, y2); ctx.lineTo(backX, y2);
    ctx.moveTo(mouthX, y1-z); ctx.lineTo(backX, y1-z); ctx.moveTo(mouthX, y2-z); ctx.lineTo(backX, y2-z); ctx.stroke();
    // Net
    ctx.lineWidth = 1; ctx.setLineDash([5, 5]); ctx.beginPath();
    for(let i=1;i<4;i++){ let my=y1+(g.h/4)*i; ctx.moveTo(mouthX,my-z); ctx.lineTo(backX,my-z); ctx.moveTo(backX,my); ctx.lineTo(backX,my-z); }
    ctx.stroke(); ctx.setLineDash([]);
  };
  drawGoal3D(pGoal, true); drawGoal3D(oGoal, false);
  
  if(isFreeThrowMode){
      ctx.fillStyle = 'rgba(255, 255, 0, 0.7)';
      ctx.font = '40px "PixelMplus12"';
      ctx.textAlign = 'center';
      ctx.fillText("FREE THROW", W/2, H/2);
      ctx.font = '20px "PixelMplus12"';
      ctx.fillText("PASS TO TEAMMATE", W/2, H/2 + 40);
  }

  const draw=(e)=>{
    ctx.strokeStyle=e.c; ctx.lineWidth=2;
    const ez = e.z || 0;
    const cx=e.x+e.w/2, t=e.y - ez, b=e.y+e.h - ez, hr=e.w/3;
    if(ez > 0){
      ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath();
      ctx.ellipse(cx, e.y+e.h, e.w/2, e.w/4, 0, 0, Math.PI*2); ctx.fill();
    }
    
    // Check for 'タマ' (Cat rendering)
    if(e.stats && e.stats.name === 'タマ'){
      ctx.fillStyle = e.c;
      // Body
      ctx.beginPath(); ctx.ellipse(cx, b-10, 12, 8, 0, 0, Math.PI*2); ctx.fill();
      // Head
      ctx.beginPath(); ctx.arc(cx, b-20, 8, 0, Math.PI*2); ctx.fill();
      // Ears
      ctx.beginPath(); ctx.moveTo(cx-6, b-25); ctx.lineTo(cx-10, b-32); ctx.lineTo(cx-2, b-27); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+6, b-25); ctx.lineTo(cx+10, b-32); ctx.lineTo(cx+2, b-27); ctx.fill();
      // Tail
      ctx.strokeStyle = e.c; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(cx+10, b-10); ctx.quadraticCurveTo(cx+20, b-20, cx+15, b-25); ctx.stroke();
      return;
    }

    ctx.beginPath(); ctx.arc(cx,t+hr,hr,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,t+hr*2); ctx.lineTo(cx,t+e.h*0.7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,t+hr*2+e.w*0.3); ctx.lineTo(cx-e.w*0.6,t+hr*2+e.w*0.1); ctx.moveTo(cx,t+hr*2+e.w*0.3); ctx.lineTo(cx+e.w*0.6,t+hr*2+e.w*0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,t+e.h*0.7); ctx.lineTo(cx-e.w/4,b); ctx.moveTo(cx,t+e.h*0.7); ctx.lineTo(cx+e.w/4,b); ctx.stroke();
  };
  draw(pKeeper); draw(oKeeper); players.forEach(draw); opponents.forEach(draw);

  if(ball.z>0){
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath();
    ctx.ellipse(ball.x, ball.y+5, B_R*(1+ball.z*0.03), B_R*(1+ball.z*0.03)/2, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle=ball.c; ctx.beginPath(); ctx.arc(ball.x, ball.y-ball.z, B_R*(1+ball.z*0.05), 0, Math.PI*2); ctx.fill();
  
  ctx.restore();
}

// --- アクション関数 (キーボードとコントローラーで共有) ---
function handlePassAction() {
  if (isResetting) return;
  const p = players.find(p => p.has);
  if (p) {
    const SHT = p.stats ? p.stats.sht_val : B_SPD;
    p.has = false; ball.last = 'player'; lastTouch = 'player'; ball.shooter = p;
    ball.x = p.x + p.w / 2; ball.y = p.y + p.h / 2;

    const facingAngle = Math.atan2(input.lastDy, input.lastDx);
    const teammates = players.filter(m => m !== p);

    const candidates = teammates.filter(m => {
      const dist = Math.hypot(m.x - p.x, m.y - p.y);
      if (dist < 300) return true;
      if (p.stats && m.stats) {
        const pPos = p.stats.pos; const mPos = m.stats.pos;
        if ((pPos === 'LB' && mPos === 'LW') || (pPos === 'RB' && mPos === 'RW')) return true;
      }
      const angleToMate = Math.atan2(m.y - p.y, m.x - p.x);
      let diff = angleToMate - facingAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      return Math.abs(diff) < (Math.PI / 2.5);
    });

    let target = null;
    if (candidates.length > 0) {
      target = candidates.reduce((best, curr) => {
        const getScore = (pl) => {
          let minOd = Infinity;
          opponents.forEach(o => {
            const d = Math.hypot(o.x - pl.x, o.y - pl.y);
            if (d < minOd) minOd = d;
          });
          let score = pl.x + (minOd * 4);
          const dist = Math.hypot(pl.x - p.x, pl.y - p.y);
          score -= dist * 1.0;
          if (p.stats && pl.stats) {
            const myPos = p.stats.pos; const tPos = pl.stats.pos;
            const goodTargets = {
              'LW': ['LB', 'CB', 'PV'], 'LB': ['LW', 'CB', 'PV'],
              'CB': ['LB', 'RB', 'PV', 'LW', 'RW'],
              'RB': ['RW', 'CB', 'PV'], 'RW': ['RB', 'CB', 'PV'],
              'PV': ['CB', 'LB', 'RB', 'LW', 'RW']
            };
            if (goodTargets[myPos] && goodTargets[myPos].includes(tPos)) {
              score += 300;
              if ((myPos === 'LB' && tPos === 'LW') || (myPos === 'RB' && tPos === 'RW')) score += 600;
              if ((myPos === 'LW' && tPos === 'LB') || (myPos === 'RW' && tPos === 'RB')) score += 600;
              if (myPos === 'CB' && (tPos === 'LB' || tPos === 'RB')) score += 400;
            }
          }
          const aToM = Math.atan2(pl.y - p.y, pl.x - p.x);
          let diff = Math.abs(aToM - facingAngle);
          if (diff > Math.PI) diff = 2 * Math.PI - diff;
          if (diff < 1.2) score += 10000;
          if (p.stats && p.stats.pos === 'CB' && pl.stats) {
            if (input.lastDy === -1 && pl.stats.pos === 'LB') score += 20000;
            if (input.lastDy === 1 && pl.stats.pos === 'RB') score += 20000;
          }
          if (minOd > 120) score += 300;
          return score;
        };
        return getScore(curr) > getScore(best) ? curr : best;
      });
    }

    if (target) {
      const a = Math.atan2(target.y - ball.y, target.x - ball.x);
      ball.x += Math.cos(a) * 40; ball.y += Math.sin(a) * 40;
      const dist = Math.hypot(target.x - ball.x, target.y - ball.y);
      let blocked = false;
      for (const o of opponents) {
        const d2 = Math.hypot(o.x - ball.x, o.y - ball.y);
        if (d2 < dist - 30 && d2 > 50) {
          const a2 = Math.atan2(o.y - ball.y, o.x - ball.x);
          let diff = Math.abs(a - a2);
          if (diff > Math.PI) diff = 2 * Math.PI - diff;
          if (diff < 0.25) { blocked = true; break; }
        }
      }
      if (blocked || dist > 600) {
        const baseHeight = blocked ? 110 : 90;
        const h_target = (dist < 350) ? baseHeight * 0.7 : baseHeight;
        const reqDz = Math.sqrt(2 * GRAV * h_target);
        const frames = 2 * reqDz / GRAV;
        ball.dz = reqDz;
        let predX = target.x, predY = target.y;
        if (Math.abs(target.dx) > 0.1 || Math.abs(target.dy) > 0.1) {
          predX = target.x + target.dx * frames * 0.8;
          predY = target.y + target.dy * frames * 0.8;
          if (predX < 0) predX = 0; if (predX > W) predX = W;
          if (predY < 0) predY = 0; if (predY > H) predY = H;
        }
        const aPred = Math.atan2(predY - ball.y, predX - ball.x);
        const distPred = Math.hypot(predX - ball.x, predY - ball.y);
        ball.dx = Math.cos(aPred) * (distPred / frames);
        ball.dy = Math.sin(aPred) * (distPred / frames);
        ball.lob = true;
      } else {
        const speed = Math.min(11, dist / 25 + 6);
        ball.dx = Math.cos(a) * speed; ball.dy = Math.sin(a) * speed;
        ball.dz = 4 + (p.z > 0 ? 2 : 0);
        ball.lob = true;
      }
    } else {
      const a = facingAngle;
      ball.x += Math.cos(a) * 30; ball.y += Math.sin(a) * 30;
      ball.dx = Math.cos(a) * SHT; ball.dy = Math.sin(a) * SHT;
      ball.dz = 4 + (p.z > 0 ? 3 : 0);
      ball.lob = false;
    }
  }
}

function handleShootAction() {
  if (isResetting) return;
  const p = players.find(p => p.has);
  if (p) {
    if (isFreeThrowMode) return;
    const SHT = p.stats ? p.stats.sht_val : B_SPD;
    p.has = false; ball.last = 'player'; lastTouch = 'player'; ball.shooter = p;
    ball.x = p.x + p.w / 2; ball.y = p.y + p.h / 2;
    let dx = 0, dy = 0; if (input.u) dy = -1; if (input.d) dy = 1; if (input.l) dx = -1; if (input.r) dx = 1;
    const isInputting = (dx !== 0 || dy !== 0);
    const a = isInputting ? Math.atan2(dy, dx) : Math.atan2(input.lastDy, input.lastDx);
    ball.x += Math.cos(a) * 30; ball.y += Math.sin(a) * 30;
    const modSHT = SHT * 1.2;
    ball.dx = Math.cos(a) * modSHT; ball.dy = Math.sin(a) * modSHT;
    ball.dz = 3 + (p.z > 0 ? 2 : 0);
    ball.lob = false;
  }
}

function handleJumpAction() {
  const p = players[activeIdx];
  if (p && p.z === 0) {
    p.dz = p.stats ? p.stats.jmp_val : 4.8;
  }
}

// --- コントローラー入力処理 ---
let prevButtons = [];
function updateGamepad() {
  const gamepads = navigator.getGamepads();
  if (!gamepads) return;
  const gp = gamepads[0];
  if (!gp) return;

  // 移動 (アナログスティックとD-pad)
  const threshold = 0.5;
  input.l = gp.axes[0] < -threshold || (gp.buttons[14] && gp.buttons[14].pressed);
  input.r = gp.axes[0] > threshold || (gp.buttons[15] && gp.buttons[15].pressed);
  input.u = gp.axes[1] < -threshold || (gp.buttons[12] && gp.buttons[12].pressed);
  input.d = gp.axes[1] > threshold || (gp.buttons[13] && gp.buttons[13].pressed);

  if (input.l) { input.lastDx = -1; input.lastDy = 0; }
  if (input.r) { input.lastDx = 1; input.lastDy = 0; }
  if (input.u) { input.lastDx = 0; input.lastDy = -1; }
  if (input.d) { input.lastDx = 0; input.lastDy = 1; }

  // ボタンアクション (エッジ検出)
  // JC-U3712F想定: 0:2, 1:3, 2:1, 3:4 (DirectInput時)
  // 一般的なマッピング: 0:A, 1:B, 2:X, 3:Y
  const buttons = gp.buttons.map(b => b.pressed);
  
  // パス: ボタン0 (A) または ボタン2 (X)
  if ((buttons[0] && !prevButtons[0]) || (buttons[2] && !prevButtons[2])) {
    handlePassAction();
  }
  // シュート: ボタン1 (B) または ボタン3 (Y)
  if ((buttons[1] && !prevButtons[1]) || (buttons[3] && !prevButtons[3])) {
    handleShootAction();
  }
  // ジャンプ: ボタン4 (L1) または ボタン5 (R1) または ボタン10 (L3)
  if ((buttons[4] && !prevButtons[4]) || (buttons[5] && !prevButtons[5])) {
    handleJumpAction();
  }

  prevButtons = buttons;
}

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.key === 'ArrowUp') { input.u = 1; input.lastDx = 0; input.lastDy = -1; }
  if (e.key === 'ArrowDown') { input.d = 1; input.lastDx = 0; input.lastDy = 1; }
  if (e.key === 'ArrowLeft') { input.l = 1; input.lastDx = -1; input.lastDy = 0; }
  if (e.key === 'ArrowRight') { input.r = 1; input.lastDx = 1; input.lastDy = 0; }

  if (e.key.toLowerCase() === 'z') handlePassAction();
  if (e.key.toLowerCase() === 'x') handleShootAction();
  if (e.key === ' ') handleJumpAction();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp') input.u = 0; if (e.key === 'ArrowDown') input.d = 0;
  if (e.key === 'ArrowLeft') input.l = 0; if (e.key === 'ArrowRight') input.r = 0;
});

init(); reset(true);
function loop() { updateGamepad(); update(); render(); requestAnimationFrame(loop); }
loop();
</script>
