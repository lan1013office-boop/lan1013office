<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lan1013オフィス - ポータル</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 90%;
        }
        h1 { font-size: 2.5em; margin-bottom: 30px; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .menu-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 30px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: transform 0.3s, background 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffd700;
        }
        
        .icon { font-size: 3em; margin-bottom: 15px; }
        .card-title { font-size: 1.5em; font-weight: bold; margin-bottom: 10px; }
        .card-desc { font-size: 0.9em; opacity: 0.8; }

        .ad-banner {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .footer { margin-top: 40px; font-size: 0.8em; opacity: 0.6; }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>lan1013オフィス</h1>
        
        <div class="menu-grid">
            <!-- 求人マップへのリンク -->
            <a href="map.html" class="menu-card">
                <div class="icon">📍</div>
                <div class="card-title">しごとみえる化マップ</div>
                <div class="card-desc">地図から直感的にバイトを探す。<br>採用でお祝い金も！</div>
            </a>
            
            <!-- ハンドボールゲームへのリンク -->
            <a href="handball_main.html" class="menu-card">
                <div class="icon">🤾‍♂️</div>
                <div class="card-title">ハンドボールゲーム</div>
                <div class="card-desc">ブラウザで遊べる！<br>本格ハンドボールシミュレーション</div>
            </a>
        </div>

        <!-- 収益化バナーエリア -->
        <div class="ad-banner">
            <p style="font-size: 0.8em; color: #ffd700; margin-bottom: 10px;">[PR] 注目のお得情報</p>
            <!-- ここにA8.netのバナーコードを貼ってください -->
            <a href="https://px.a8.net/svt/ejp?a8mat=YOUR_ID" target="_blank" rel="nofollow">
                <img border="0" width="300" height="50" alt="広告バナー" src="https://www27.a8.net/svt/bgt?aid=sample&wid=001&eno=01&mid=s00000000001001&mc=1">
            </a>
        </div>

        <div class="footer">
            &copy; 2026 lan1013オフィス プロジェクト
        </div>
    </div>
</body>
</html>
