<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しごとみえる化プロジェクト - ホーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        p { font-size: 1.1em; margin-bottom: 30px; opacity: 0.9; }
        .menu-btn {
            display: inline-block;
            background: #ffd700;
            color: #333;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            transition: transform 0.2s, background 0.2s;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            background: #ffec80;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>しごとみえる化<br>プロジェクト</h1>
        <p>地図から直感的に、あなたにぴったりの<br>アルバイトを見つけよう。</p>
        
        <a href="map.html" class="menu-btn">📍 地図でバイトをさがす</a>
        
        <div class="footer">
            &copy; 2026 しごとみえる化プロジェクト
        </div>
    </div>
</body>
</html>
